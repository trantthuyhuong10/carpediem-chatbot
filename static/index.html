<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carpe Diem</title>
    <link rel="icon" href="/static/favicon.ico" type="image/webp">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <div class="sidebar-header">
                <button id="new-chat-btn" class="new-chat-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    New Chat
                </button>
            </div>
            <div id="session-list" class="session-list"></div>
            <div class="sidebar-footer">
                <div class="brand">Carpe Diem</div>
                <div class="brand-tagline">Thủ công, an toàn, thân thiện</div>
                <a href="/admin" class="admin-link">⚙️ Admin</a>
            </div>
        </aside>

        <main id="chat-area">
            <button id="menu-toggle" class="menu-toggle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>

            <div id="welcome-screen" class="welcome-screen">
                <div class="welcome-logo">
                    <img src="/static/img/carpediem_logo.webp" alt="Carpe Diem" onerror="this.style.display='none'">
                    <h1>Carpe Diem</h1>
                </div>
                <p class="welcome-tagline">Thủ công, an toàn, thân thiện</p>
                <div class="suggestions">
                    <button class="suggestion-btn" data-prompt="Gợi ý nến thơm dưới 500k">Gợi ý nến thơm dưới 500k</button>
                    <button class="suggestion-btn" data-prompt="Quà sinh nhật cho bạn gái">Quà sinh nhật cho bạn gái</button>
                    <button class="suggestion-btn" data-prompt="Tinh dầu thư giãn">Tinh dầu thư giãn</button>
                    <button class="suggestion-btn" data-prompt="Giftset tân gia">Giftset tân gia</button>
                </div>
            </div>

            <div id="messages-container" class="messages-container"></div>

            <div id="input-area" class="input-area">
                <div id="image-preview" class="image-preview" style="display: none;">
                    <img id="preview-img" src="" alt="Preview">
                    <button id="remove-image-btn" class="remove-image-btn">✕</button>
                </div>
                <div class="input-wrapper">
                    <button id="upload-btn" class="upload-btn" title="Đính kèm ảnh">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                    </button>
                    <input type="file" id="image-input" accept="image/png,image/jpeg,image/webp" hidden>
                    <textarea id="message-input" placeholder="Nhập câu hỏi..." rows="1"></textarea>
                    <button id="send-btn" class="send-btn" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
                <p class="input-hint">Carpe Diem có thể sai. Hãy kiểm tra thông tin quan trọng.</p>
            </div>
        </main>
    </div>

    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <script src="/static/app.js"></script>
</body>
</html>
